<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taithai URL Shortener</title>
  <style>
    body{font-family:Arial,sans-serif;background:#fdf6f0;color:#4a3728;margin:0;padding:24px}
    .box{max-width:760px;margin:0 auto;background:#fff;border:1px solid #edd8c8;border-radius:14px;padding:20px}
    input,button{padding:10px;border-radius:10px;border:1px solid #d7b9a5;font-size:14px}
    input{width:100%;margin:6px 0 12px}
    .row{display:grid;grid-template-columns:1fr 180px;gap:10px}
    button{background:#e8896a;color:#fff;cursor:pointer}
    .item{padding:10px;border:1px solid #f0dfd3;border-radius:10px;margin-top:10px;background:#fffaf7}
    a{color:#c65f3b;word-break:break-all}
    .muted{color:#7a5c48;font-size:13px}
  </style>
</head>
<body>
  <div class="box">
    <h1>🔗 Taithai URL Shortener</h1>
    <p class="muted">สร้างลิงก์สั้นที่ใช้งานได้จริงเมื่อวางในเบราว์เซอร์: <b>go.taithai.app/?c=รหัส</b> (รองรับรูปแบบสวยงาม <b>/รหัส</b> หากเซิร์ฟเวอร์ตั้ง rewrite)</p>
    <label>Long URL</label>
    <input id="longUrl" placeholder="https://example.com/page" />
    <div class="row">
      <div>
        <label>Custom code (optional)</label>
        <input id="alias" placeholder="my-link" />
      </div>
      <div style="align-self:end">
        <button id="createBtn" style="width:100%">Create Short Link</button>
      </div>
    </div>
    <div id="result"></div>
    <h3>My links</h3>
    <div id="list"></div>
  </div>
<script>
const BASE_DOMAIN='https://go.taithai.app';
const SHORT_MODE='query';
const STORE_KEY='taithai_short_links_v1';
const params=new URLSearchParams(location.search);
const pathCode=location.pathname.split('/').filter(Boolean).pop();
const queryCode=params.get('c');
const maybeCode=(queryCode||(/^[a-zA-Z0-9_-]{4,32}$/.test(pathCode||'')?pathCode:null));

function load(){return JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}
function save(data){localStorage.setItem(STORE_KEY,JSON.stringify(data))}
function validUrl(s){try{const u=new URL(s); return ['http:','https:'].includes(u.protocol);}catch{return false}}
function randCode(){const chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';let o='';for(let i=0;i<7;i++)o+=chars[Math.floor(Math.random()*chars.length)];return o}

(function tryRedirect(){
  if(!maybeCode) return;
  const db=load();
  if(db[maybeCode]?.url){
    db[maybeCode].visits=(db[maybeCode].visits||0)+1; save(db);
    location.replace(db[maybeCode].url);
  }
})();

function render(){
  const db=load(); const list=document.getElementById('list'); list.innerHTML='';
  const keys=Object.keys(db).sort((a,b)=>db[b].createdAt-db[a].createdAt);
  if(!keys.length){list.innerHTML='<div class="muted">ยังไม่มีลิงก์</div>'; return;}
  for(const code of keys){
    const x=db[code];
    const el=document.createElement('div'); el.className='item';
    const short=`${BASE_DOMAIN}/?c=${code}`;
    const pretty=`${BASE_DOMAIN}/${code}`;
    const fallback=`${location.origin}${location.pathname}?c=${code}`;
    el.innerHTML=`<div><b>${code}</b> · ${x.visits||0} visits</div>
    <div>Short URL (works when pasted): <a href="${short}" target="_blank">${short}</a></div>
    <div>Pretty URL (needs server rewrite): <a href="${pretty}" target="_blank">${pretty}</a></div>
    <div>Local test URL: <a href="${fallback}" target="_blank">${fallback}</a></div>
    <div>Destination: <a href="${x.url}" target="_blank">${x.url}</a></div>`;
    list.appendChild(el);
  }
}

document.getElementById('createBtn').onclick=()=>{
  const longUrl=document.getElementById('longUrl').value.trim();
  let alias=document.getElementById('alias').value.trim();
  if(!validUrl(longUrl)) return alert('กรุณาใส่ URL ให้ถูกต้อง (http/https)');
  if(alias && !/^[a-zA-Z0-9_-]{4,32}$/.test(alias)) return alert('โค้ดต้องยาว 4-32 ตัว และใช้ a-z A-Z 0-9 _ -');
  const db=load();
  if(!alias){ do{alias=randCode()}while(db[alias]); }
  if(db[alias]) return alert('โค้ดนี้ถูกใช้แล้ว');
  db[alias]={url:longUrl,createdAt:Date.now(),visits:0}; save(db);
  const short=`${BASE_DOMAIN}/?c=${alias}`;
  const pretty=`${BASE_DOMAIN}/${alias}`;
  const fallback=`${location.origin}${location.pathname}?c=${alias}`;
  document.getElementById('result').innerHTML=`<div class="item"><b>Created!</b><br>Short URL (works when pasted): <a href="${short}" target="_blank">${short}</a><br>Pretty URL (requires rewrite): ${pretty}<br><button id="copyBtn">Copy ${short}</button></div>`;
  document.getElementById('copyBtn').onclick=()=>navigator.clipboard.writeText(short);
  render();
};
render();
</script>
</body>
</html>
