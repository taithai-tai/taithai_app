<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taithai Apps 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FDF6F0;
      --surface: #FFFCF9;
      --peach: #F5C4A8;
      --peach-dark: #C97A52;
      --text: #4A3728;
      --text-mid: #7A5C48;
      --text-muted: #A88B78;
      --text-faint: #CEBCB0;
      --border: #EDD8C8;
      --border-soft: #F5E8DC;
      --accent: #E8896A;
      --accent-light: #FDEEE8;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Sans Thai', 'Mitr', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .blob1 {
      width: 480px;
      height: 480px;
      background: #F5C4A8;
      top: -140px;
      right: -100px;
    }

    .blob2 {
      width: 340px;
      height: 340px;
      background: #F2B8B8;
      bottom: 40px;
      left: -100px;
    }

    .blob3 {
      width: 220px;
      height: 220px;
      background: #E8D090;
      top: 45%;
      left: 32%;
    }

    .float-deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.1;
      font-size: 30px;
      animation: floatY 7s ease-in-out infinite;
    }

    .float-deco:nth-of-type(1) {
      top: 14%;
      left: 3%;
      animation-delay: 0s;
    }

    .float-deco:nth-of-type(2) {
      top: 58%;
      right: 2%;
      animation-delay: 2.5s;
    }

    .float-deco:nth-of-type(3) {
      bottom: 18%;
      left: 6%;
      animation-delay: 5s;
    }

    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }

    header, main, footer {
      position: relative;
      z-index: 1;
    }

    header {
      background: rgba(253, 246, 240, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1.5px solid var(--border-soft);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #F5C4A8 0%, #F2B8B8 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      box-shadow: 0 4px 14px rgba(232, 137, 106, 0.28);
    }

    .brand-name {
      font-family: 'Mitr', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .brand-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      margin-left: 1px;
      vertical-align: middle;
      margin-bottom: 2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: var(--text-mid);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .lang-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px rgba(232, 137, 106, 0.28);
    }

    .wrapper {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .hero {
      padding: 52px 0 36px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-light);
      border: 1.5px solid var(--peach);
      border-radius: 40px;
      padding: 5px 16px;
      font-size: 12px;
      color: var(--peach-dark);
      font-weight: 500;
      margin-bottom: 18px;
    }

    .hero h1 {
      font-family: 'Mitr', sans-serif;
      font-size: clamp(28px, 5.5vw, 44px);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .hero h1 .hi {
      color: var(--accent);
      position: relative;
      display: inline-block;
    }

    .hero h1 .hi::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      height: 8px;
      background: var(--peach);
      opacity: 0.4;
      border-radius: 4px;
      z-index: -1;
    }

    .hero p {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 620px;
      margin: 0 auto 28px;
      font-weight: 300;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1.5px solid var(--border-soft);
      border-radius: 40px;
      padding: 7px 16px;
      font-size: 13px;
      color: var(--text-mid);
    }

    .stat-num {
      font-family: 'Mitr', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .stat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 420px));
      justify-content: center;
      gap: 16px;
      margin-bottom: 56px;
    }

    .app-card {
      background: var(--surface);
      border: 1.5px solid var(--border-soft);
      border-radius: var(--radius);
      padding: 22px 20px 18px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.22s cubic-bezier(.34,1.4,.64,1), box-shadow 0.22s, border-color 0.2s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .app-card::before {
      content: '';
      position: absolute;
      top: -28px;
      right: -28px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #FDE8E8;
      opacity: 0.55;
      transition: transform 0.3s ease;
    }

    .app-card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow: 0 10px 32px rgba(185,110,80,0.13);
      border-color: var(--peach);
    }

    .app-card:hover::before {
      transform: scale(1.7);
    }

    .app-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      background: #FDE8E8;
      position: relative;
      z-index: 1;
    }

    .app-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .app-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 300;
    }

    .app-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 40px;
      font-weight: 500;
      margin-top: auto;
      width: fit-content;
      background: #FDE8E8;
      color: #B85050;
    }

    footer {
      border-top: 1.5px solid var(--border-soft);
      padding: 22px 0;
    }

    .footer-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-left,
    .footer-right {
      font-size: 13px;
      color: var(--text-faint);
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #FDF6F0;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 13px;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(.34,1.3,.64,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 720px) {
      .header-inner {
        padding: 12px 16px;
        align-items: flex-start;
      }

      .header-actions {
        width: 100%;
        justify-content: flex-end;
        margin-left: 0;
      }
    }

    @media (max-width: 640px) {
      .wrapper {
        padding: 0 16px;
      }

      .hero {
        padding: 36px 0 28px;
      }

      .apps-grid {
        grid-template-columns: 1fr;
      }

      .app-card {
        padding: 16px 14px 14px;
      }

      .app-icon {
        width: 48px;
        height: 48px;
        font-size: 22px;
      }

      .app-name {
        font-size: 14px;
      }
    }

    @media (max-width: 380px) {
      .brand-name {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="float-deco">🌸</div>
  <div class="float-deco">🌷</div>
  <div class="float-deco">✿</div>

  <div class="toast" id="toast"></div>

  <header>
    <div class="header-inner">
      <a class="brand" href="javascript:void(0)">
        <div class="brand-logo">🌸</div>
        <span class="brand-name">Taithai<span class="brand-dot"></span></span>
      </a>

      <div class="header-actions">
        <div class="lang-switch">
          <button class="lang-btn active" id="langEnBtn" onclick="setLanguage('en')">EN</button>
          <button class="lang-btn" id="langThBtn" onclick="setLanguage('th')">ไทย</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="wrapper">
      <section class="hero">
        <div class="hero-badge" id="heroBadge"></div>
        <h1 id="heroTitle"></h1>
        <p id="heroDesc"></p>
      </section>

      <div class="stats-bar">
        <div class="stat-pill">
          <div class="stat-dot"></div>
          <span class="stat-num">4</span>
          <span id="totalAppsLabel"></span>
        </div>
        <div class="stat-pill">
          <span>🕐</span>
          <span id="updatedTodayLabel"></span>
        </div>
      </div>

      <div class="section-head">
        <span class="section-label" id="gridLabel"></span>
        <div class="section-line"></div>
      </div>

      <div class="apps-grid">
        <a class="app-card" href="javascript:void(0)" onclick="goToTemporaryChat()">
          <div class="app-icon">💬</div>
          <div>
            <div class="app-name" id="appName1"></div>
            <div class="app-desc" id="appDesc1"></div>
          </div>
          <span class="app-tag" id="appTag1"></span>
        </a>

        <a class="app-card" href="javascript:void(0)" onclick="goToQrGenerator()">
          <div class="app-icon">🔳</div>
          <div>
            <div class="app-name" id="appName2"></div>
            <div class="app-desc" id="appDesc2"></div>
          </div>
          <span class="app-tag" id="appTag2"></span>
        </a>

        <a class="app-card" href="javascript:void(0)" onclick="goToQrReader()">
          <div class="app-icon">📷</div>
          <div>
            <div class="app-name" id="appName3"></div>
            <div class="app-desc" id="appDesc3"></div>
          </div>
          <span class="app-tag" id="appTag3"></span>
        </a>
        <a class="app-card" href="javascript:void(0)" onclick="goToUrlShortener()">
          <div class="app-icon">🔗</div>
          <div>
            <div class="app-name" id="appName4"></div>
            <div class="app-desc" id="appDesc4"></div>
          </div>
          <span class="app-tag" id="appTag4"></span>
        </a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-left" id="footerLeft"></div>
      <div class="footer-right" id="footerRight"></div>
    </div>
  </footer>

  <script>
    const TEMP_CHAT_URL = "https://taithai.app/temporary%20chat/";
    const QR_GENERATOR_URL = "https://taithai.app/QR%20Code%20Generator%20/";
    const QR_READER_URL = "https://taithai.app/QR%20Code%20Reader/";
    const URL_SHORTENER_URL = "https://taithai.app/URL%20Shortener/";

    const i18n = {
      en: {
        htmlLang: "en",
        pageTitle: "Taithai Apps 🌸",
        heroBadge: "🎀 My apps",
        heroTitle: `Welcome to<br><span class="hi">Taithai Apps</span>`,
        heroDesc: "A clean page featuring your real apps in one place for quick access.",
        totalAppsLabel: "apps",
        updatedTodayLabel: "Updated today",
        gridLabel: "Available apps",

        appName1: "Taithai Temporary Chat",
        appDesc1: "A real temporary chat app for quickly creating chat rooms, sharing a room link, and chatting instantly without a complicated setup.",
        appTag1: "💬 Real App",

        appName2: "QR Code Generator",
        appDesc2: "Create QR codes easily for links, text, or shared content with a simple and fast generator interface.",
        appTag2: "🔳 QR Tool",

        appName3: "QR Code Reader",
        appDesc3: "Scan QR codes instantly with your camera or image uploads and open link results in one tap.",
        appTag3: "📷 QR Scan",

        appName4: "URL Shortener",
        appDesc4: "Create real short links that become go.taithai.app/code and manage them in one place.",
        appTag4: "🔗 Short URL",

        footerLeft: `🌸 Taithai Apps · <span id="yearInline"></span>`,
        footerRight: "Made with love ♡",
        openingText1: "Opening Taithai Temporary Chat… 🌸",
        openingText2: "Opening QR Code Generator… 🌸",
        openingText3: "Opening QR Code Reader… 🌸",
        noLinkYet2: "No link added yet for QR Code Generator",
        noLinkYet3: "No link added yet for QR Code Reader",
        openingText4: "Opening URL Shortener… 🌸",
        noLinkYet4: "No link added yet for URL Shortener"
      },
      th: {
        htmlLang: "th",
        pageTitle: "Taithai Apps 🌸",
        heroBadge: "🎀 แอปของฉัน",
        heroTitle: `ยินดีต้อนรับสู่<br><span class="hi">Taithai Apps</span>`,
        heroDesc: "หน้าเว็บแบบเรียบง่ายที่รวมแอปจริงของคุณไว้ในที่เดียวเพื่อให้เข้าถึงได้รวดเร็ว",
        totalAppsLabel: "แอป",
        updatedTodayLabel: "อัปเดตล่าสุดวันนี้",
        gridLabel: "แอปที่ใช้งานได้",

        appName1: "Taithai Temporary Chat",
        appDesc1: "แอปแชตชั่วคราวที่มีอยู่จริง ใช้สำหรับสร้างห้องแชตแบบรวดเร็ว แชร์ลิงก์ห้อง และคุยกันได้ทันทีโดยไม่ต้องตั้งค่าอะไรซับซ้อน",
        appTag1: "💬 แอปจริง",

        appName2: "ตัวสร้างคิวอาร์โค้ด",
        appDesc2: "สร้างคิวอาร์โค้ดได้อย่างง่ายดายสำหรับลิงก์ ข้อความ หรือคอนเทนต์ที่ต้องการแชร์ ด้วยหน้าใช้งานที่เรียบง่ายและรวดเร็ว",
        appTag2: "🔳 เครื่องมือ QR",

        appName3: "ตัวอ่านคิวอาร์โค้ด",
        appDesc3: "สแกน QR Code ได้ทันทีผ่านกล้องหรือรูปภาพ พร้อมเปิดลิงก์จากผลลัพธ์ได้ในคลิกเดียว",
        appTag3: "📷 สแกน QR",

        appName4: "URL Shortener",
        appDesc4: "สร้างลิงก์สั้นแบบใช้งานจริงให้เป็นรูปแบบ go.taithai.app/รหัส และจัดการได้ในที่เดียว",
        appTag4: "🔗 ลิงก์สั้น",

        footerLeft: `🌸 Taithai Apps · <span id="yearInline"></span>`,
        footerRight: "สร้างด้วยความรัก ♡",
        openingText1: "กำลังเปิด Taithai Temporary Chat… 🌸",
        openingText2: "กำลังเปิด ตัวสร้างคิวอาร์โค้ด… 🌸",
        openingText3: "กำลังเปิด ตัวอ่านคิวอาร์โค้ด… 🌸",
        noLinkYet2: "ยังไม่ได้ใส่ลิงก์ของ ตัวสร้างคิวอาร์โค้ด",
        noLinkYet3: "ยังไม่ได้ใส่ลิงก์ของ ตัวอ่านคิวอาร์โค้ด",
        openingText4: "กำลังเปิด URL Shortener… 🌸",
        noLinkYet4: "ยังไม่ได้ใส่ลิงก์ของ URL Shortener"
      }
    };

    let currentLang = localStorage.getItem("taithaiLang") || "en";

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("taithaiLang", lang);
      renderLanguage();
    }

    function renderLanguage() {
      const t = i18n[currentLang];

      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;

      document.getElementById("heroBadge").textContent = t.heroBadge;
      document.getElementById("heroTitle").innerHTML = t.heroTitle;
      document.getElementById("heroDesc").textContent = t.heroDesc;
      document.getElementById("totalAppsLabel").textContent = t.totalAppsLabel;
      document.getElementById("updatedTodayLabel").textContent = t.updatedTodayLabel;
      document.getElementById("gridLabel").textContent = t.gridLabel;

      document.getElementById("appName1").textContent = t.appName1;
      document.getElementById("appDesc1").textContent = t.appDesc1;
      document.getElementById("appTag1").textContent = t.appTag1;

      document.getElementById("appName2").textContent = t.appName2;
      document.getElementById("appDesc2").textContent = t.appDesc2;
      document.getElementById("appTag2").textContent = t.appTag2;

      document.getElementById("appName3").textContent = t.appName3;
      document.getElementById("appDesc3").textContent = t.appDesc3;
      document.getElementById("appTag3").textContent = t.appTag3;

      document.getElementById("appName4").textContent = t.appName4;
      document.getElementById("appDesc4").textContent = t.appDesc4;
      document.getElementById("appTag4").textContent = t.appTag4;

      document.getElementById("footerLeft").innerHTML = t.footerLeft;
      document.getElementById("footerRight").textContent = t.footerRight;
      document.getElementById("langEnBtn").classList.toggle("active", currentLang === "en");
      document.getElementById("langThBtn").classList.toggle("active", currentLang === "th");
      document.getElementById("yearInline").textContent = new Date().getFullYear();
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function goToTemporaryChat() {
      showToast(i18n[currentLang].openingText1);
      setTimeout(() => {
        window.location.href = TEMP_CHAT_URL;
      }, 250);
    }

    function goToQrGenerator() {
      if (!QR_GENERATOR_URL || QR_GENERATOR_URL === "javascript:void(0)") {
        showToast(i18n[currentLang].noLinkYet2);
        return;
      }

      showToast(i18n[currentLang].openingText2);
      setTimeout(() => {
        window.location.href = QR_GENERATOR_URL;
      }, 250);
    }



    function goToQrReader() {
      if (!QR_READER_URL || QR_READER_URL === "javascript:void(0)") {
        showToast(i18n[currentLang].noLinkYet3);
        return;
      }

      showToast(i18n[currentLang].openingText3);
      setTimeout(() => {
        window.location.href = QR_READER_URL;
      }, 250);
    }
    function goToUrlShortener() {
      if (!URL_SHORTENER_URL || URL_SHORTENER_URL === "javascript:void(0)") {
        showToast(i18n[currentLang].noLinkYet4);
        return;
      }

      showToast(i18n[currentLang].openingText4);
      setTimeout(() => {
        window.location.href = URL_SHORTENER_URL;
      }, 250);
    }

    renderLanguage();
  </script>
</body>
</html>
