<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bubbles — ห้องแชทชั่วคราว</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8F3;
    --peach: #FFE5D4;
    --peach2: #FFCDB2;
    --sand: #F5CBA7;
    --rose: #E8A598;
    --rose2: #D4756A;
    --brown: #8B5E52;
    --dark: #3D2B26;
    --white: #FFFFFF;
    --gray: #9C8480;
    --font: 'Noto Sans Thai', 'Nunito', sans-serif;
    --radius: 22px;
    --radius-sm: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--cream); font-family: var(--font); color: var(--dark); overflow: hidden; }
  .app { width: 100%; max-width: 430px; height: 100dvh; margin: 0 auto; display: flex; flex-direction: column; position: relative; background: var(--cream); overflow: hidden; }

  .screen { display: none; flex-direction: column; height: 100dvh; }
  .screen.active { display: flex; }

  /* HOME */
  #home { background: var(--cream); align-items: center; justify-content: center; padding: 2rem 2rem 3rem; }
  .home-deco { width: 110px; height: 110px; background: var(--peach); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; position: relative; }
  .home-deco::before { content: ''; width: 80px; height: 80px; background: var(--peach2); border-radius: 50%; position: absolute; }
  .home-deco .icon { position: relative; z-index: 1; font-size: 36px; }
  .home-title { font-size: 30px; font-weight: 700; color: var(--dark); margin-bottom: 6px; letter-spacing: -0.5px; }
  .home-sub { font-size: 14px; color: var(--gray); margin-bottom: 3rem; text-align: center; line-height: 1.6; }
  .btn-main { width: 100%; max-width: 300px; padding: 16px; border-radius: var(--radius); border: none; font-family: var(--font); font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
  .btn-main:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary { background: var(--rose2); color: white; }
  .btn-secondary { background: var(--white); color: var(--brown); border: 2px solid var(--peach2); }
  .dots-deco { display: flex; gap: 6px; margin-top: 2.5rem; }
  .dots-deco span { width: 8px; height: 8px; border-radius: 50%; background: var(--peach2); }
  .dots-deco span:nth-child(2) { background: var(--rose); }
  .dots-deco span:nth-child(3) { background: var(--sand); }

  /* OVERLAY / SHEET */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(61,43,38,0.35); z-index: 100; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
  .overlay.active { display: flex; }
  .sheet { background: var(--white); border-radius: 28px 28px 0 0; padding: 1.5rem 1.5rem 2.5rem; width: 100%; max-width: 430px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .sheet-handle { width: 40px; height: 4px; background: var(--peach2); border-radius: 4px; margin: 0 auto 1.25rem; }
  .sheet-title { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .sheet-sub { font-size: 13px; color: var(--gray); margin-bottom: 1.5rem; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--brown); letter-spacing: 0.5px; display: block; margin-bottom: 6px; text-transform: uppercase; }
  .field input { width: 100%; padding: 14px 16px; border-radius: var(--radius-sm); border: 2px solid var(--peach); background: var(--cream); font-family: var(--font); font-size: 16px; color: var(--dark); outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--rose); }
  .field input::placeholder { color: var(--sand); }
  .code-field { letter-spacing: 8px; font-size: 22px; font-weight: 700; text-align: center; text-transform: uppercase; }
  .err-msg { font-size: 13px; color: var(--rose2); margin-top: -8px; margin-bottom: 10px; padding-left: 4px; display: none; }

  /* WAITING */
  #waiting { align-items: center; justify-content: center; padding: 2rem; background: var(--cream); }
  .waiting-top { width: 100%; display: flex; align-items: center; margin-bottom: 2rem; }
  .back-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--peach2); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--brown); flex-shrink: 0; }
  .waiting-card { background: var(--white); border-radius: 28px; padding: 2rem; width: 100%; text-align: center; border: 2px solid var(--peach); }
  .waiting-label { font-size: 13px; font-weight: 600; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .code-big { font-size: 42px; font-weight: 700; letter-spacing: 10px; color: var(--rose2); margin-bottom: 8px; cursor: pointer; transition: opacity 0.15s; }
  .code-big:active { opacity: 0.7; }
  .copy-tip { font-size: 12px; color: var(--gray); margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--cream); border-radius: 20px; padding: 8px 16px; font-size: 13px; color: var(--gray); margin-bottom: 1.5rem; }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #7BC47F; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .share-hint { font-size: 13px; color: var(--gray); line-height: 1.6; }

  /* CHAT */
  #chat { background: var(--cream); }
  .chat-header { background: var(--white); padding: 14px 16px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid var(--peach); flex-shrink: 0; }
  .chat-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--peach2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 16px; font-weight: 700; color: var(--dark); }
  .chat-meta { font-size: 12px; color: var(--gray); }
  .leave-btn { padding: 8px 14px; border-radius: 20px; border: 2px solid var(--peach2); background: transparent; font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--brown); cursor: pointer; flex-shrink: 0; }

  .messages-wrap { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 4px; }
  .messages-wrap::-webkit-scrollbar { display: none; }

  .sys-msg { text-align: center; font-size: 12px; color: var(--gray); padding: 8px 0; display: flex; align-items: center; gap: 8px; }
  .sys-msg::before, .sys-msg::after { content: ''; flex: 1; height: 1px; background: var(--peach); }

  .msg-group { display: flex; flex-direction: column; margin-bottom: 2px; }
  .msg-group.me { align-items: flex-end; }
  .msg-group.other { align-items: flex-start; }
  .msg-sender { font-size: 11px; font-weight: 600; color: var(--brown); margin-bottom: 3px; padding: 0 8px; }
  .msg-row { display: flex; align-items: flex-end; gap: 6px; max-width: 82%; }
  .msg-group.me .msg-row { flex-direction: row-reverse; }
  .msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; background: var(--peach2); }

  .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.55; word-break: break-word; max-width: 100%; }
  .msg-group.me .bubble { background: var(--rose2); color: white; border-bottom-right-radius: 5px; }
  .msg-group.other .bubble { background: var(--white); color: var(--dark); border-bottom-left-radius: 5px; border: 1.5px solid var(--peach); }
  .bubble a { color: inherit; text-decoration: underline; text-underline-offset: 2px; word-break: break-all; }
  .msg-group.me .bubble a { color: #ffe0d6; }
  .msg-group.other .bubble a { color: var(--rose2); }

  .img-bubble { padding: 4px; border-radius: 18px; overflow: hidden; max-width: 220px; cursor: pointer; }
  .img-bubble img { width: 100%; border-radius: 14px; display: block; }
  .msg-group.me .img-bubble { background: var(--rose2); border-bottom-right-radius: 5px; }
  .msg-group.other .img-bubble { background: var(--white); border: 1.5px solid var(--peach); border-bottom-left-radius: 5px; }

  .file-bubble { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 18px; max-width: 220px; text-decoration: none; }
  .msg-group.me .file-bubble { background: var(--rose2); color: white; border-bottom-right-radius: 5px; }
  .msg-group.other .file-bubble { background: var(--white); color: var(--dark); border: 1.5px solid var(--peach); border-bottom-left-radius: 5px; }
  .file-icon { font-size: 24px; flex-shrink: 0; }
  .file-name { font-size: 13px; font-weight: 600; word-break: break-all; display: block; }
  .file-size { font-size: 11px; opacity: 0.75; display: block; }

  .msg-time { font-size: 10px; color: var(--gray); padding: 0 6px; margin-top: 2px; }

  /* INPUT BAR */
  .chat-input-bar { background: var(--white); border-top: 2px solid var(--peach); padding: 10px 12px 16px; display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; position: relative; }
  .attach-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--peach2); background: var(--cream); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 22px; line-height: 1; transition: background 0.15s; }
  .attach-btn:active { background: var(--peach2); }
  .chat-input { flex: 1; min-height: 44px; max-height: 120px; padding: 11px 16px; border-radius: 22px; border: 2px solid var(--peach); background: var(--cream); font-family: var(--font); font-size: 15px; color: var(--dark); outline: none; resize: none; overflow-y: auto; line-height: 1.4; transition: border-color 0.15s; }
  .chat-input:focus { border-color: var(--rose); }
  .chat-input::placeholder { color: var(--sand); }
  .send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--rose2); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.15s, background 0.15s; }
  .send-btn:active { transform: scale(0.92); background: var(--brown); }
  .send-btn svg { width: 18px; height: 18px; }

  /* ATTACH MENU */
  .attach-menu { display: none; position: absolute; bottom: 76px; left: 12px; background: var(--white); border-radius: 18px; border: 2px solid var(--peach); padding: 8px; z-index: 50; flex-direction: column; gap: 2px; }
  .attach-menu.open { display: flex; animation: fadeUp 0.15s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .attach-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--dark); border: none; background: none; font-family: var(--font); width: 100%; text-align: left; }
  .attach-item:hover { background: var(--cream); }
  .attach-item span:first-child { font-size: 20px; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90dvh; border-radius: 16px; object-fit: contain; }
  .lightbox-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* TOAST */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--dark); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .connecting { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; padding: 2rem; flex: 1; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--peach2); border-top-color: var(--rose2); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #file-input, #img-input { display: none; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="home-deco"><span class="icon">💬</span></div>
    <div class="home-title">Bubbles</div>
    <p class="home-sub">ห้องแชทชั่วคราว<br>ไม่เก็บข้อมูล ไม่ต้องสมัคร</p>
    <button class="btn-main btn-primary" onclick="openSheet('sheet-create')">✦ สร้างห้องใหม่</button>
    <button class="btn-main btn-secondary" onclick="openSheet('sheet-join')">↗ เข้าร่วมห้อง</button>
    <div class="dots-deco"><span></span><span></span><span></span></div>
  </div>

  <!-- SHEET: CREATE -->
  <div id="sheet-create" class="overlay" onclick="closeSheetOutside(event,'sheet-create')">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">สร้างห้องแชท 🌸</div>
      <div class="sheet-sub">ตั้งชื่อแล้วแชร์รหัสให้เพื่อน</div>
      <div class="field">
        <label>ชื่อของคุณ</label>
        <input id="create-name" placeholder="เช่น มินตรา" maxlength="20" onkeydown="if(event.key==='Enter')doCreate()"/>
      </div>
      <button class="btn-main btn-primary" style="max-width:100%;margin-top:4px" onclick="doCreate()">สร้างห้องเลย ✦</button>
    </div>
  </div>

  <!-- SHEET: JOIN -->
  <div id="sheet-join" class="overlay" onclick="closeSheetOutside(event,'sheet-join')">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">เข้าร่วมห้อง 🔑</div>
      <div class="sheet-sub">กรอกรหัสจากเพื่อนที่สร้างห้อง</div>
      <div class="field">
        <label>รหัสห้อง</label>
        <input id="join-code" class="code-field" placeholder="ABC123" maxlength="6"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')document.getElementById('join-name').focus()"/>
      </div>
      <div class="field">
        <label>ชื่อของคุณ</label>
        <input id="join-name" placeholder="เช่น พีท" maxlength="20" onkeydown="if(event.key==='Enter')doJoin()"/>
      </div>
      <div id="join-err" class="err-msg"></div>
      <button class="btn-main btn-primary" style="max-width:100%;margin-top:4px" onclick="doJoin()">เข้าร่วมเลย ↗</button>
    </div>
  </div>

  <!-- WAITING -->
  <div id="waiting" class="screen">
    <div class="waiting-top">
      <button class="back-btn" onclick="cancelHost()">←</button>
    </div>
    <div class="waiting-card">
      <div class="waiting-label">รหัสห้องของคุณ</div>
      <div class="code-big" id="room-code-display" onclick="copyCode()"></div>
      <div class="copy-tip">👆 แตะเพื่อคัดลอก</div>
      <div class="status-pill"><span class="pulse-dot"></span><span id="wait-status">รอเพื่อนเข้าร่วม...</span></div>
      <p class="share-hint">แชร์รหัสนี้ให้เพื่อน<br>แล้วให้เขากด "เข้าร่วมห้อง"</p>
    </div>
    <button class="btn-main btn-primary" style="margin-top:1.5rem" onclick="hostEnterChat()">เริ่มแชทได้เลย</button>
  </div>

  <!-- CHAT -->
  <div id="chat" class="screen">
    <div class="chat-header">
      <div class="chat-avatar">💬</div>
      <div class="chat-info">
        <div class="chat-name" id="chat-room-name">ห้อง</div>
        <div class="chat-meta" id="chat-meta">กำลังเชื่อมต่อ...</div>
      </div>
      <button class="leave-btn" onclick="leaveChat()">ออก</button>
    </div>
    <div class="messages-wrap" id="messages"></div>

    <div class="attach-menu" id="attach-menu">
      <button class="attach-item" onclick="triggerImg()"><span>🖼️</span><span>รูปภาพ</span></button>
      <button class="attach-item" onclick="triggerFile()"><span>📎</span><span>ไฟล์</span></button>
    </div>

    <div class="chat-input-bar">
      <button class="attach-btn" id="attach-btn" onclick="toggleAttachMenu(event)">＋</button>
      <textarea class="chat-input" id="chat-input" placeholder="พิมพ์ข้อความ..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="รูปภาพ">
  </div>

</div>

<div class="toast" id="toast"></div>
<input type="file" id="img-input" accept="image/*" onchange="handleImg(this)">
<input type="file" id="file-input" onchange="handleFile(this)">

<script>
const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
const AVATARS = ['🌸','🍑','🌼','🍀','💙','🌙','🌟','🍓'];

let peer = null, conn = null;
let myName = '', myRoom = '';
let isHost = false, memberCount = 1;
let connections = {};
let joinTimeout = null;

/* ── UTILS ── */
function genCode() {
  let c = '';
  for (let i = 0; i < 6; i++) c += CHARS[Math.floor(Math.random() * CHARS.length)];
  return c;
}
function ts() { return new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); }
function fmtSize(b) { return b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg, dur=2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function openSheet(id) {
  document.getElementById(id).classList.add('active');
  setTimeout(() => { const i = document.querySelector('#'+id+' input'); if(i) i.focus(); }, 300);
}
function closeSheet(id) { document.getElementById(id).classList.remove('active'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) closeSheet(id); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }

/* ── LINK DETECTION ── */
function linkify(text) {
  return esc(text).replace(/(https?:\/\/[^\s<>"]+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
}

/* ── RENDER MESSAGE ── */
function addMsg(type, data) {
  const wrap = document.getElementById('messages');
  const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 100;
  const el = document.createElement('div');

  if (type === 'sys') {
    el.className = 'sys-msg';
    el.textContent = data.text;
  } else {
    const isMe = data.name === myName;
    el.className = 'msg-group ' + (isMe ? 'me' : 'other');
    const av = AVATARS[data.name.charCodeAt(0) % AVATARS.length];

    if (!isMe) {
      const sn = document.createElement('div');
      sn.className = 'msg-sender';
      sn.textContent = data.name;
      el.appendChild(sn);
    }

    const row = document.createElement('div');
    row.className = 'msg-row';
    if (!isMe) {
      const avEl = document.createElement('div');
      avEl.className = 'msg-av';
      avEl.textContent = av;
      row.appendChild(avEl);
    }

    if (data.kind === 'image') {
      const bub = document.createElement('div');
      bub.className = 'img-bubble';
      const img = document.createElement('img');
      img.src = data.dataUrl;
      img.alt = 'รูปภาพ';
      img.onclick = () => openLightbox(data.dataUrl);
      bub.appendChild(img);
      row.appendChild(bub);
    } else if (data.kind === 'file') {
      const a = document.createElement('a');
      a.className = 'file-bubble';
      a.href = data.dataUrl;
      a.download = data.fileName;
      a.innerHTML = '<span class="file-icon">📄</span><div><span class="file-name">'+esc(data.fileName)+'</span><span class="file-size">'+esc(data.fileSize)+'</span></div>';
      row.appendChild(a);
    } else {
      const bub = document.createElement('div');
      bub.className = 'bubble';
      bub.innerHTML = linkify(data.text || '');
      row.appendChild(bub);
    }

    el.appendChild(row);
    const t = document.createElement('div');
    t.className = 'msg-time';
    t.textContent = data.time;
    el.appendChild(t);
  }

  wrap.appendChild(el);
  if (atBottom) wrap.scrollTop = wrap.scrollHeight;
}

/* ── HOST BROADCAST (never back to self) ── */
function broadcast(data, skipPeerId) {
  Object.entries(connections).forEach(([id,c]) => {
    if (id === skipPeerId) return;
    try { c.send(data); } catch(e){}
  });
}

function updateMeta() {
  document.getElementById('chat-meta').textContent = 'รหัส ' + myRoom + ' · ' + memberCount + ' คน';
}

/* ── CREATE (HOST) ── */
function doCreate() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) { document.getElementById('create-name').focus(); return; }
  myName = name; myRoom = genCode(); isHost = true;
  closeSheet('sheet-create');
  document.getElementById('room-code-display').textContent = myRoom;
  document.getElementById('wait-status').textContent = 'รอเพื่อนเข้าร่วม...';
  setScreen('waiting');
  initHostPeer();
}

function initHostPeer() {
  peer = new Peer('bubbles-' + myRoom, {debug:0});
  peer.on('connection', (c) => {
    connections[c.peer] = c;
    c.on('data', (data) => {
      if (data.type === 'join') {
        memberCount++;
        document.getElementById('wait-status').textContent = memberCount + ' คนอยู่ในห้องแล้ว';
        const m = {type:'sys', text: data.name+' เข้าร่วมห้อง', time: ts()};
        addMsg('sys', m);
        broadcast(m, c.peer);
        updateMeta();
      } else if (data.type === 'msg') {
        /* guest → host: display + relay, do NOT echo back to sender */
        addMsg('msg', data);
        broadcast(data, c.peer);
      } else if (data.type === 'leave') {
        memberCount = Math.max(1, memberCount-1);
        const m = {type:'sys', text: data.name+' ออกจากห้อง', time: ts()};
        addMsg('sys', m);
        broadcast(m, c.peer);
        delete connections[c.peer];
        updateMeta();
      }
    });
    c.on('close', () => { delete connections[c.peer]; });
  });
  peer.on('error', () => showToast('เกิดข้อผิดพลาด ลองใหม่อีกครั้ง'));
}

function hostEnterChat() {
  document.getElementById('chat-room-name').textContent = 'ห้อง ' + myRoom;
  updateMeta();
  setScreen('chat');
  setTimeout(() => document.getElementById('chat-input').focus(), 100);
}

function copyCode() {
  if (navigator.clipboard) navigator.clipboard.writeText(myRoom).then(() => showToast('คัดลอกรหัสแล้ว ✓'));
}
function cancelHost() {
  if(peer){peer.destroy();peer=null;}
  connections={};
  setScreen('home');
}

/* ── JOIN (GUEST) ── */
function doJoin() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const name = document.getElementById('join-name').value.trim();
  const err = document.getElementById('join-err');
  err.style.display='none';
  if (code.length < 6) { err.textContent='กรุณากรอกรหัส 6 หลักให้ครบ'; err.style.display='block'; return; }
  if (!name) { err.textContent='กรุณากรอกชื่อของคุณ'; err.style.display='block'; return; }
  myName=name; myRoom=code; isHost=false;
  closeSheet('sheet-join');
  connectToHost(code, name);
}

function connectToHost(code, name) {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="connecting"><div class="spinner"></div><div style="font-size:14px;color:var(--gray)">กำลังเชื่อมต่อ...</div></div>';
  document.getElementById('chat-room-name').textContent = 'ห้อง ' + code;
  document.getElementById('chat-meta').textContent = 'กำลังเชื่อมต่อ...';
  setScreen('chat');

  peer = new Peer(undefined, {debug:0});
  peer.on('open', () => {
    conn = peer.connect('bubbles-'+code, {reliable:true});

    joinTimeout = setTimeout(() => {
      if (!conn.open) showJoinError();
    }, 9000);

    conn.on('open', () => {
      clearTimeout(joinTimeout);
      msgs.innerHTML = '';
      addMsg('sys', {text:'เชื่อมต่อสำเร็จ 🎉', time:ts()});
      document.getElementById('chat-meta').textContent = 'รหัส ' + code;
      conn.send({type:'join', name});
      setTimeout(() => document.getElementById('chat-input').focus(), 100);
    });
    conn.on('data', (data) => {
      /* host relays msgs from others OR sys events */
      if (data.type==='sys') addMsg('sys', data);
      else if (data.type==='msg') addMsg('msg', data);
    });
    conn.on('close', () => {
      addMsg('sys', {text:'การเชื่อมต่อถูกตัด', time:ts()});
      document.getElementById('chat-meta').textContent = 'ออฟไลน์';
    });
    conn.on('error', showJoinError);
  });
  peer.on('error', showJoinError);
}

function showJoinError() {
  clearTimeout(joinTimeout);
  document.getElementById('messages').innerHTML='';
  if(peer){peer.destroy();peer=null;} conn=null;
  setScreen('home');
  openSheet('sheet-join');
  const err=document.getElementById('join-err');
  err.textContent='ไม่พบห้องนี้ ตรวจสอบรหัสแล้วลองใหม่';
  err.style.display='block';
}

/* ── SEND TEXT ── */
function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  const data = {type:'msg', kind:'text', name:myName, text, time:ts()};
  addMsg('msg', data);                          /* show to self once */
  if (isHost) broadcast(data, null);            /* relay to all guests */
  else if (conn && conn.open) conn.send(data);  /* send to host */
  inp.value=''; inp.style.height='auto';
}

/* ── ATTACH ── */
function toggleAttachMenu(e) {
  e.stopPropagation();
  document.getElementById('attach-menu').classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('attach-menu').classList.remove('open'));

function triggerImg() { document.getElementById('attach-menu').classList.remove('open'); document.getElementById('img-input').click(); }
function triggerFile() { document.getElementById('attach-menu').classList.remove('open'); document.getElementById('file-input').click(); }

function sendData(data) {
  addMsg('msg', data);
  if (isHost) broadcast(data, null);
  else if (conn && conn.open) conn.send(data);
}

function handleImg(input) {
  const file = input.files[0]; if(!file) return;
  if (file.size > 5*1024*1024) { showToast('รูปใหญ่เกินไป (สูงสุด 5 MB)'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => sendData({type:'msg', kind:'image', name:myName, dataUrl:e.target.result, time:ts()});
  reader.readAsDataURL(file); input.value='';
}

function handleFile(input) {
  const file = input.files[0]; if(!file) return;
  if (file.size > 10*1024*1024) { showToast('ไฟล์ใหญ่เกินไป (สูงสุด 10 MB)'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => sendData({type:'msg', kind:'file', name:myName, dataUrl:e.target.result, fileName:file.name, fileSize:fmtSize(file.size), time:ts()});
  reader.readAsDataURL(file); input.value='';
}

/* ── LIGHTBOX ── */
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

/* ── LEAVE ── */
function leaveChat() {
  if (conn && conn.open) conn.send({type:'leave', name:myName});
  if (peer){peer.destroy();peer=null;} conn=null;
  connections={}; memberCount=1;
  clearTimeout(joinTimeout);
  document.getElementById('messages').innerHTML='';
  ['join-code','join-name','create-name'].forEach(id => document.getElementById(id).value='');
  document.getElementById('join-err').style.display='none';
  setScreen('home');
}
</script>
