
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); color: var(--color-text-primary); }
.page { display: none; padding: 2rem 1rem; min-height: 500px; }
.page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
.chat-page { display: none; flex-direction: column; height: 560px; }
.chat-page.active { display: flex; }

h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; text-align: center; }
.subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem; text-align: center; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 15px; cursor: pointer; font-family: var(--font-sans); width: 100%; max-width: 280px; transition: background 0.15s; }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { padding: 7px 14px; font-size: 13px; max-width: none; width: auto; }

.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; width: 100%; max-width: 320px; }

.room-code { font-size: 32px; font-weight: 500; letter-spacing: 6px; text-align: center; padding: 1rem; background: var(--color-background-secondary); border-radius: var(--border-radius-md); margin: 1rem 0; font-family: var(--font-mono); }

.input { width: 100%; padding: 9px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
.input:focus { border-color: var(--color-border-primary); }
.input-code { letter-spacing: 4px; font-family: var(--font-mono); font-size: 20px; text-align: center; text-transform: uppercase; }

label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }

.chat-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.chat-header-left { display: flex; flex-direction: column; }
.chat-title { font-size: 15px; font-weight: 500; }
.chat-code-badge { font-size: 11px; color: var(--color-text-secondary); font-family: var(--font-mono); letter-spacing: 2px; margin-top: 2px; }
.online-badge { font-size: 12px; color: var(--color-text-secondary); }

.messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; background: var(--color-background-secondary); }
.msg-row { display: flex; flex-direction: column; }
.msg-row.me { align-items: flex-end; }
.msg-row.other { align-items: flex-start; }
.msg-name { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; padding: 0 6px; }
.msg-bubble { max-width: 72%; padding: 8px 12px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg-row.me .msg-bubble { background: var(--color-text-primary); color: var(--color-background-primary); border-bottom-right-radius: 4px; }
.msg-row.other .msg-bubble { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-bottom-left-radius: 4px; }
.msg-time { font-size: 10px; color: var(--color-text-secondary); margin-top: 3px; padding: 0 6px; }
.system-msg { text-align: center; font-size: 12px; color: var(--color-text-tertiary); padding: 4px 0; }

.chat-input-area { display: flex; gap: 8px; padding: 10px 16px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.chat-input { flex: 1; padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; font-size: 14px; font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
.chat-input:focus { border-color: var(--color-border-primary); }
.send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--color-text-primary); color: var(--color-background-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.send-btn:hover { opacity: 0.8; }
.send-btn svg { width: 16px; height: 16px; }

.divider { width: 100%; max-width: 280px; height: 0.5px; background: var(--color-border-tertiary); margin: 1rem 0; }
.error { font-size: 13px; color: var(--color-text-danger, #c0392b); margin-top: 8px; text-align: center; }
.gap { margin-bottom: 12px; }
.copy-tip { font-size: 12px; color: var(--color-text-secondary); text-align: center; cursor: pointer; padding: 4px; }
.copy-tip:hover { color: var(--color-text-primary); }
.waiting-msg { font-size: 13px; color: var(--color-text-secondary); text-align: center; margin-top: 4px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; background: var(--color-background-info, #E6F1FB); color: var(--color-text-info, #185FA5); flex-shrink: 0; }
</style>

<h2 class="sr-only">ระบบห้องแชทชั่วคราว — สร้างหรือเข้าร่วมห้องด้วยรหัส 6 หลัก</h2>

<div id="home-page" class="page active">
  <h1>Temp Chat</h1>
  <p class="subtitle">ห้องแชทชั่วคราว ไม่เก็บข้อมูล</p>
  <button class="btn btn-primary gap" onclick="showCreate()">+ สร้างห้องใหม่</button>
  <div class="divider"></div>
  <button class="btn" onclick="showJoin()">เข้าร่วมห้อง</button>
</div>

<div id="create-page" class="page">
  <div class="card">
    <h1 style="font-size:18px;margin-bottom:4px;">สร้างห้องแชท</h1>
    <p class="subtitle" style="margin-bottom:1.2rem;">ตั้งชื่อของคุณก่อนเข้าห้อง</p>
    <label>ชื่อของคุณ</label>
    <input id="create-name" class="input gap" placeholder="เช่น มินตรา" maxlength="20" />
    <div style="margin-top:4px;"></div>
    <button class="btn btn-primary" onclick="createRoom()" style="max-width:none;">สร้างห้อง</button>
    <button class="btn" onclick="showHome()" style="max-width:none;margin-top:8px;">ย้อนกลับ</button>
  </div>
</div>

<div id="join-page" class="page">
  <div class="card">
    <h1 style="font-size:18px;margin-bottom:4px;">เข้าร่วมห้อง</h1>
    <p class="subtitle" style="margin-bottom:1.2rem;">กรอกรหัสห้องและชื่อของคุณ</p>
    <label>รหัสห้อง (6 หลัก)</label>
    <input id="join-code" class="input input-code gap" placeholder="ABC123" maxlength="6" />
    <div style="margin-top:12px;"></div>
    <label>ชื่อของคุณ</label>
    <input id="join-name" class="input gap" placeholder="เช่น พีท" maxlength="20" />
    <div id="join-error" class="error" style="display:none;"></div>
    <div style="margin-top:4px;"></div>
    <button class="btn btn-primary" onclick="joinRoom()" style="max-width:none;">เข้าร่วม</button>
    <button class="btn" onclick="showHome()" style="max-width:none;margin-top:8px;">ย้อนกลับ</button>
  </div>
</div>

<div id="waiting-page" class="page">
  <div class="card" style="text-align:center;">
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px;">รหัสห้อง</p>
    <div class="room-code" id="display-code"></div>
    <p class="copy-tip" onclick="copyCode()" id="copy-tip">แตะเพื่อคัดลอกรหัส</p>
    <p style="font-size:13px;color:var(--color-text-secondary);margin:12px 0 4px;">แชร์รหัสนี้ให้เพื่อนเข้าร่วม</p>
    <div id="waiting-status" class="waiting-msg">รอผู้เข้าร่วม...</div>
    <button class="btn btn-primary" onclick="enterChat()" style="max-width:none;margin-top:16px;" id="start-chat-btn">เริ่มแชทได้เลย</button>
    <button class="btn" onclick="leaveRoom()" style="max-width:none;margin-top:8px;">ยกเลิกห้อง</button>
  </div>
</div>

<div id="chat-page" class="chat-page">
  <div class="chat-header">
    <div class="chat-header-left">
      <span class="chat-title" id="chat-room-title">ห้อง</span>
      <span class="chat-code-badge" id="chat-code-display"></span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="online-badge" id="online-count"></span>
      <button class="btn btn-sm" onclick="leaveRoom()">ออก</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <input class="chat-input" id="chat-input" placeholder="พิมพ์ข้อความ..." maxlength="500" onkeydown="if(event.key==='Enter')sendMessage()" />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
const rooms = {};
let myRoom = null;
let myName = null;
let myId = null;
let pollInterval = null;

function genCode() {
  let c = '';
  for (let i = 0; i < 6; i++) c += CHARS[Math.floor(Math.random() * CHARS.length)];
  return c;
}

function genId() {
  return Math.random().toString(36).slice(2, 9);
}

function now() {
  return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function showHome() { setPage('home-page'); stopPoll(); }
function showCreate() { setPage('create-page'); setTimeout(() => document.getElementById('create-name').focus(), 100); }
function showJoin() {
  setPage('join-page');
  document.getElementById('join-error').style.display = 'none';
  setTimeout(() => document.getElementById('join-code').focus(), 100);
}

function setPage(id) {
  document.querySelectorAll('.page, .chat-page').forEach(p => { p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function createRoom() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) { document.getElementById('create-name').focus(); return; }
  let code;
  do { code = genCode(); } while (rooms[code]);
  myId = genId();
  myName = name;
  myRoom = code;
  rooms[code] = {
    members: [{ id: myId, name }],
    messages: [{ type: 'system', text: `${name} สร้างห้องนี้`, time: now() }]
  };
  document.getElementById('display-code').textContent = code;
  document.getElementById('chat-code-display').textContent = 'รหัส: ' + code;
  document.getElementById('chat-room-title').textContent = 'ห้อง ' + code;
  setPage('waiting-page');
  startPoll();
}

function enterChat() {
  setPage('chat-page');
  renderMessages();
  updateOnline();
}

function copyCode() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(myRoom).then(() => {
      const el = document.getElementById('copy-tip');
      el.textContent = 'คัดลอกแล้ว!';
      setTimeout(() => el.textContent = 'แตะเพื่อคัดลอกรหัส', 1500);
    });
  }
}

function joinRoom() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const name = document.getElementById('join-name').value.trim();
  const errEl = document.getElementById('join-error');
  errEl.style.display = 'none';
  if (!code || code.length < 6) { errEl.textContent = 'กรุณากรอกรหัสห้อง 6 หลักให้ครบ'; errEl.style.display = 'block'; return; }
  if (!name) { errEl.textContent = 'กรุณากรอกชื่อของคุณ'; errEl.style.display = 'block'; return; }
  if (!rooms[code]) { errEl.textContent = 'ไม่พบห้องที่มีรหัสนี้ กรุณาตรวจสอบอีกครั้ง'; errEl.style.display = 'block'; return; }
  myId = genId();
  myName = name;
  myRoom = code;
  rooms[code].members.push({ id: myId, name });
  rooms[code].messages.push({ type: 'system', text: `${name} เข้าร่วมห้อง`, time: now() });
  document.getElementById('chat-code-display').textContent = 'รหัส: ' + code;
  document.getElementById('chat-room-title').textContent = 'ห้อง ' + code;
  setPage('chat-page');
  renderMessages();
  updateOnline();
  startPoll();
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !myRoom || !rooms[myRoom]) return;
  rooms[myRoom].messages.push({ type: 'msg', senderId: myId, senderName: myName, text, time: now() });
  input.value = '';
  renderMessages();
}

function renderMessages() {
  if (!myRoom || !rooms[myRoom]) return;
  const el = document.getElementById('messages');
  const msgs = rooms[myRoom].messages;
  el.innerHTML = msgs.map(m => {
    if (m.type === 'system') return `<div class="system-msg">${m.text} · ${m.time}</div>`;
    const isMe = m.senderId === myId;
    return `<div class="msg-row ${isMe ? 'me' : 'other'}">
      ${!isMe ? `<span class="msg-name">${esc(m.senderName)}</span>` : ''}
      <div class="msg-bubble">${esc(m.text)}</div>
      <span class="msg-time">${m.time}</span>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function updateOnline() {
  if (!myRoom || !rooms[myRoom]) return;
  const count = rooms[myRoom].members.length;
  document.getElementById('online-count').textContent = count + ' คนในห้อง';
  const ws = document.getElementById('waiting-status');
  if (ws) ws.textContent = count > 1 ? `${count} คนอยู่ในห้องแล้ว` : 'รอผู้เข้าร่วม...';
}

function startPoll() {
  stopPoll();
  pollInterval = setInterval(() => {
    if (!myRoom || !rooms[myRoom]) return;
    renderMessages();
    updateOnline();
  }, 500);
}

function stopPoll() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

function leaveRoom() {
  if (myRoom && rooms[myRoom]) {
    rooms[myRoom].members = rooms[myRoom].members.filter(m => m.id !== myId);
    rooms[myRoom].messages.push({ type: 'system', text: `${myName} ออกจากห้อง`, time: now() });
    if (rooms[myRoom].members.length === 0) delete rooms[myRoom];
  }
  myRoom = null; myName = null; myId = null;
  stopPoll();
  setPage('home-page');
  document.getElementById('create-name').value = '';
  document.getElementById('join-code').value = '';
  document.getElementById('join-name').value = '';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('join-code').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
});
</script>
