<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BU Degree Plan Explorer</title>
  <style>
    body{font-family:'Noto Sans Thai',system-ui,sans-serif;margin:0;background:#f7f8fc;color:#1f2937}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .card{background:#fff;border:1px solid #e8ebf3;border-radius:14px;padding:16px;margin-bottom:14px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,select{padding:10px 12px;border:1px solid #d8dce8;border-radius:10px}
    input[type=url]{min-width:360px;flex:1}
    button{padding:10px 14px;border:none;border-radius:10px;background:#5b7cfa;color:#fff;cursor:pointer}
    .muted{color:#667085}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .chip{background:#eef2ff;color:#3949ab;border-radius:999px;padding:4px 10px;font-size:.82rem;cursor:pointer}
    .group h3{margin:14px 0 8px}
    .item{border:1px solid #eceff6;border-radius:12px;padding:12px;margin-bottom:8px;background:#fcfdff}
    .item a{font-weight:600;color:#1d4ed8;text-decoration:none}
    .meta{font-size:.86rem;color:#6b7280;margin-top:4px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>ตัวอ่าน Degree Plan (BU) แบบอ่านง่าย</h1>
    <p class="muted">ดึงลิงก์ PDF จากหน้า Degree Plan แล้วจัดหมวดให้อ่านง่าย ค้นหาเร็ว และกดเปิดเอกสารได้ทันที</p>
    <div class="row">
      <input id="sourceUrl" type="url" value="https://degreeplan.bu.ac.th/#1556788856475-c06a4ef5-110d" />
      <button id="loadBtn">โหลดข้อมูล</button>
    </div>
    <div class="row" style="margin-top:10px">
      <input id="searchInput" type="text" placeholder="ค้นหาด้วยชื่อหลักสูตร/คณะ/ปี" style="min-width:240px;flex:1" />
      <select id="categorySelect"><option value="">ทุกหมวด</option></select>
    </div>
    <div class="chips" id="quickChips"></div>
    <div id="status" class="muted" style="margin-top:8px"></div>
  </div>

  <div class="card" id="summary"></div>
  <div class="card" id="results"></div>
</div>
<script>
const categoryKeywords=[
  ['Business',['business','บริหาร','commerce','account','บัญชี']],
  ['Engineering',['engineer','วิศว']],
  ['Communication Arts',['communication','นิเทศ']],
  ['Science/Tech',['science','tech','computer','it','data','วิทยา','เทคโน']],
  ['Arts/Humanities',['art','human','language','ภาษา','ศิลป']],
  ['International',['international','inter','นานาชาติ']],
];

const state={items:[],filtered:[]};
const statusEl=document.getElementById('status');

function categorize(name){
  const n=name.toLowerCase();
  for(const [cat,keys] of categoryKeywords){if(keys.some(k=>n.includes(k))) return cat;}
  return 'Other';
}

function parseLinks(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const links=[];
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const m=line.match(/\((https?:\/\/[^\s)]+\.pdf[^)]*)\)/i) || line.match(/(https?:\/\/[^\s]+\.pdf\S*)/i);
    if(!m) continue;
    const url=m[1];
    let title=line.replace(/\(https?:\/\/[^)]+\)/,'').trim();
    if(!title||title.length<4){title=(lines[i-1]||'Degree Plan PDF').trim();}
    links.push({title,url,category:categorize(title)});
  }
  const seen=new Set();
  return links.filter(x=>{if(seen.has(x.url)) return false; seen.add(x.url); return true;});
}

async function loadData(){
  const raw=document.getElementById('sourceUrl').value.trim();
  const base=raw.split('#')[0];
  statusEl.textContent='กำลังดึงข้อมูล...';
  const proxyUrl='https://r.jina.ai/http://'+base.replace(/^https?:\/\//,'');
  const res=await fetch(proxyUrl);
  const txt=await res.text();
  const items=parseLinks(txt);
  state.items=items;
  statusEl.textContent=`โหลดสำเร็จ ${items.length} ไฟล์`;
  buildFilters(items);
  applyFilters();
}

function buildFilters(items){
  const categories=[...new Set(items.map(i=>i.category))].sort();
  const sel=document.getElementById('categorySelect');
  sel.innerHTML='<option value="">ทุกหมวด</option>'+categories.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('quickChips').innerHTML=categories.map(c=>`<span class="chip" data-c="${c}">${c}</span>`).join('');
  document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{sel.value=ch.dataset.c;applyFilters();});
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const c=document.getElementById('categorySelect').value;
  state.filtered=state.items.filter(i=>(!c||i.category===c)&&(!q||(`${i.title} ${i.url} ${i.category}`.toLowerCase().includes(q))));
  render();
}

function render(){
  const sum=document.getElementById('summary');
  const results=document.getElementById('results');
  const byCat={};
  state.filtered.forEach(i=>{(byCat[i.category]??=[]).push(i)});
  sum.innerHTML=`<b>สรุป:</b> ทั้งหมด ${state.items.length} รายการ | ที่แสดง ${state.filtered.length} รายการ | ${Object.keys(byCat).length} หมวด`;
  if(!state.filtered.length){results.innerHTML='<div class="muted">ไม่พบข้อมูลตามเงื่อนไข</div>';return;}
  results.innerHTML=Object.entries(byCat).sort((a,b)=>b[1].length-a[1].length).map(([cat,list])=>`<div class="group"><h3>${cat} (${list.length})</h3>${list.map(x=>`<div class="item"><a href="${x.url}" target="_blank" rel="noopener">${x.title}</a><div class="meta">${x.url}</div></div>`).join('')}</div>`).join('');
}

document.getElementById('loadBtn').onclick=()=>loadData().catch(e=>{console.error(e);statusEl.textContent='โหลดข้อมูลไม่สำเร็จ (อาจโดนบล็อกจากต้นทาง)';});
document.getElementById('searchInput').addEventListener('input',applyFilters);
document.getElementById('categorySelect').addEventListener('change',applyFilters);
loadData().catch(()=>{});
</script>
</body>
</html>
