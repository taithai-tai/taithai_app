<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BU Degree Plan Selector</title>
  <style>
    body{font-family:'Noto Sans Thai',system-ui,sans-serif;margin:0;background:#f5f7fc;color:#1f2937}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}.card{background:#fff;border:1px solid #e7ecf5;border-radius:14px;padding:16px;margin-bottom:12px}
    .row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px} select,button{padding:11px;border:1px solid #d6deea;border-radius:10px}
    button{background:#4f7cff;color:#fff;border:none;cursor:pointer}.muted{color:#667085}
    .result{display:grid;grid-template-columns:320px 1fr;gap:12px}.item{padding:10px;border:1px solid #e8edf7;border-radius:10px;margin-bottom:8px;cursor:pointer}
    .item.active{background:#eef3ff;border-color:#4f7cff} iframe{width:100%;height:75vh;border:1px solid #dfe5f3;border-radius:10px}
    @media(max-width:920px){.row{grid-template-columns:1fr}.result{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2 style="margin:0 0 8px">เลือกคณะ > สาขา > ปี แล้วดู Degree Plan ได้ทันที</h2>
    <div class="muted">ข้อมูลเป็นชุดคงที่ (fixed options) เลือกจาก dropdown ได้เลย ไม่ต้องพิมพ์</div>
    <div id="catalogInfo" class="muted" style="margin-top:6px"></div>
    <div class="row" style="margin-top:10px">
      <select id="faculty"></select>
      <select id="major" disabled></select>
      <select id="year" disabled></select>
    </div>
    <div style="margin-top:10px"><button id="showBtn" disabled>แสดง Degree Plan</button></div>
  </div>

  <div class="card result">
    <div id="list"></div>
    <div>
      <div id="meta" class="muted" style="margin-bottom:8px"></div>
      <iframe id="viewer"></iframe>
    </div>
  </div>
</div>
<script>
// เพิ่มรายการใหม่ใน array นี้ได้เลย เมื่อมีไฟล์ใหม่จาก BU
const DEGREE_PLANS = [
  {
    faculty: 'คณะบริหารธุรกิจ (School of Business Administration)',
    major: 'หลักสูตรปริญญาตรี',
    year: '2568',
    title: 'ปีการศึกษา 2568 - หลักสูตรปริญญาตรี คณะบริหารธุรกิจ',
    url: 'https://degreeplan.bu.ac.th/download/degree-plan/undergraduate-programs/02-school-of-business-administration/%E0%B8%9B%E0%B8%B5%E0%B8%81%E0%B8%B2%E0%B8%A3%E0%B8%A8%E0%B8%B6%E0%B8%81%E0%B8%A9%E0%B8%B2%202568%20-%20%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%81%E0%B8%AA%E0%B8%B9%E0%B8%95%E0%B8%A3%E0%B8%9B%E0%B8%A3%E0%B8%B4%E0%B8%8D%E0%B8%8D%E0%B8%B2%E0%B8%95%E0%B8%A3%E0%B8%B5%20%E0%B8%84%E0%B8%93%E0%B8%B0%E0%B8%9A%E0%B8%A3%E0%B8%B4%E0%B8%AB%E0%B8%B2%E0%B8%A3%E0%B8%98%E0%B8%B8%E0%B8%A3%E0%B8%81%E0%B8%B4%E0%B8%88.pdf'
  }
];

const facultyEl = document.getElementById('faculty');
const majorEl = document.getElementById('major');
const yearEl = document.getElementById('year');
const showBtn = document.getElementById('showBtn');
const listEl = document.getElementById('list');
const metaEl = document.getElementById('meta');
const viewer = document.getElementById('viewer');
const catalogInfo = document.getElementById('catalogInfo');

const unique = arr => [...new Set(arr)];
function setOptions(el, placeholder, values){el.innerHTML=`<option value="">${placeholder}</option>`+values.map(v=>`<option value="${v}">${v}</option>`).join('');}

function initFaculties(){
  const faculties = unique(DEGREE_PLANS.map(x=>x.faculty));
  setOptions(facultyEl, 'เลือกคณะ', faculties);
  setOptions(majorEl, 'เลือกสาขา', []);
  setOptions(yearEl, 'เลือกปี', []);
  catalogInfo.textContent = `มีคณะให้เลือก ${faculties.length} คณะ`;
}

facultyEl.onchange=()=>{
  const f=facultyEl.value;
  majorEl.disabled=!f; yearEl.disabled=true; showBtn.disabled=true;
  const majors=unique(DEGREE_PLANS.filter(x=>x.faculty===f).map(x=>x.major));
  setOptions(majorEl,'เลือกสาขา',majors); setOptions(yearEl,'เลือกปี',[]);
};

majorEl.onchange=()=>{
  const f=facultyEl.value,m=majorEl.value;
  yearEl.disabled=!m; showBtn.disabled=true;
  const years=unique(DEGREE_PLANS.filter(x=>x.faculty===f&&x.major===m).map(x=>x.year)).sort().reverse();
  setOptions(yearEl,'เลือกปี',years);
};

yearEl.onchange=()=>{showBtn.disabled=!yearEl.value};

function renderPlans(items){
  if(!items.length){listEl.innerHTML='<div class="muted">ไม่พบข้อมูล</div>'; viewer.removeAttribute('src'); metaEl.textContent=''; return;}
  listEl.innerHTML=items.map((x,i)=>`<div class="item ${i===0?'active':''}" data-i="${i}">${x.title}</div>`).join('');
  const open=(i)=>{const x=items[i]; metaEl.innerHTML=`<b>${x.faculty}</b> • ${x.major} • ปี ${x.year}<br><a href="${x.url}" target="_blank">เปิดไฟล์ต้นฉบับ</a>`; viewer.src=x.url;};
  open(0);
  listEl.querySelectorAll('.item').forEach(el=>el.onclick=()=>{listEl.querySelectorAll('.item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); open(+el.dataset.i);});
}

showBtn.onclick=()=>{
  const items=DEGREE_PLANS.filter(x=>x.faculty===facultyEl.value&&x.major===majorEl.value&&x.year===yearEl.value);
  renderPlans(items);
};

initFaculties();
</script>
</body>
</html>
